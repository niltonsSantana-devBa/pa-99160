<!-- Exercicio 

Elabore um algoritimo para solicitar dois náumeros e ao final mostre na tela:
A média, a soma, o produto, o maior e o menor número.

Usando uma linha para cada resultando -->


<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Resultados Escolar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <img src="assets/logo_tipo-removebg-preview.png" alt="Logo" class="logo-image">
    </header> 

    <main class="conteiner">
        <h1>Gerador de nota, soma, produto, maior e menor</h1>

        <form id="calcForm">
            <label for="nota1Input">Digite o primeiro número</label>
            <input type="number" id="nota1Input" placeholder="Ex.: 5" required step="any">
            
            <label for="nota2Input">Digite o segundo número</label>
            <input type="number" id="nota2Input" placeholder="Ex.: 5" required step="any">

            <button type="submit" id="gerarBotao">Gerar Resultado</button>
        </form>

        <section id="resultadoMedia" class="hidden" aria-live="polite">
            <p>Soma: <span id="resSoma"></span></p>
            <p>Média: <span id="resMedia"></span></p>
            <p>Produto: <span id="resProduto"></span></p>
            <p>Maior: <span id="resMaior"></span></p>
            <p>Menor: <span id="resMenor"></span></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
