<!-- Crie um site para resolver a seguinte questões:

Escreva um programa que solicite ao usuário a quantidade de maçãs desejadas.
As maçãs custarão R$1,30 cada, se forem compradas menos de uma dúzia, e custarão R$1,00
cada, se forem comporadas pelo menos 12.
Calcule e mostre valor total da compra. -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Maçãs - Kira</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="conteiner">
        <img src="assets/logo_tipo-removebg-preview.png" alt="logo maçã" id="logoCaderno">
        
        <h1>🍎 Loja de Maçãs 🍎</h1>
        <p>Menos de 1 dúzia: <strong class="blood-text">R$ 1,30 cada</strong><br>A partir de 1 dúzia: <strong class="blood-text">R$ 1,00 cada</strong></p>

        <form id="kiraForm">
            <label for="quantidadeInput" class="hidden-label">Quantidade de maçãs:</label>
            <input type="number" id="quantidadeInput" placeholder="Quantidade..." required min="1">
            <button type="submit" id="btnEscrever">ESCREVER NO CADERNO</button>
        </form>
        
        <section id="resultado" class="hidden" aria-live="polite">
            <p id="resStatus"></p>
        </section>
    </main> 

    <script src="script.js"></script>
</body>
</html>
