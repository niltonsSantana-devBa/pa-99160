<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pode Votar? - Tema Spider-Man</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <img src="assets/logo_tipo-removebg-preview.png" alt="Logo tipo" id="imagemHeroi">

        <h1>POSSO VOTAR?</h1>
        <p id="subtitle">Teu sentido aranha eleitoral!</p>
        
        <form id="votoForm">
            <label for="idadeInput" class="hidden-label">Idade:</label>
            <input type="number" id="idadeInput" placeholder="Sua Idade" required min="0" max="130">
            <button type="submit" id="btnVerificar">VERIFICAR</button>
        </form>
        
        <div id="resultado" class="hidden" aria-live="polite">
            <p id="resStatus"></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
