<!-- Elabore um algoritmo usando operações lógicas para uma empresa que quer verificar se
um empregado está qualificado para a aposentadoria ou não.

Para estar em condições, um dos seguintes requisitos deve ser satisfeito:

Ter no mínimo 65 anos de idade.
Ter trabalhado no mínimo 30 anos.

Com base nas informações acima, faça um algoritmo que solicite ao usuário: a
matrícula do empregado (código), o ano de seu nascimento e o tempo de  trabalho em
anos.

O programa deverá escrever o código do empregado, a idade, o tempo de trabalho do
empregado e a mensagem “Requerer aposentadoria” ou “Não requerer
aposentadoria”. -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH - Verificador de Aposentadoria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <img src="/6html-css-js/assets/logo_tipo-removebg-preview.png" alt="Logo tipo">
        <h2>🏢 Sistema de Aposentadoria</h2>
        
        <div class="form-group">
            <label for="codigo">Matrícula do Empregado:</label>
            <input type="text" id="codigo" placeholder="Ex: 12345">
        </div>

        <div class="form-group">
            <label for="anoNascimento">Ano de Nascimento:</label>
            <input type="number" id="anoNascimento" placeholder="Ex: 1955">
        </div>

        <div class="form-group">
            <label for="tempoTrabalho">Tempo de Trabalho (Anos):</label>
            <input type="number" id="tempoTrabalho" placeholder="Ex: 32">
        </div>

        <button onclick="verificarAposentadoria()">Verificar Situação</button>

        <div id="resultado" class="hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
