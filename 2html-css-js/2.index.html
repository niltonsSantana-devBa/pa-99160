<!-- Atividade

Solicite ao usuário o nome e duas notas.
Calcule e mostre a média aritmedica.
considerando a média 7,0 para aprovação, informe se 
está aprovado ou reprovado -->


<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcule sua média</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <img src="assets/logo_tipo-removebg-preview.png" alt="Logo" class="logo">
        <form class="container2" id="mediaForm">
            <h1>Gerador de notas</h1>
            <!-- nome: -->
            <label for="nomeInput">Informe seu nome </label>
            <input type="text" id="nomeInput" placeholder="Ex.:Lucas" required>

            <!-- nota1: -->
            <label for="nota1Input">Digite sua 1° nota </label>
            <input type="number" id="nota1Input" placeholder="Ex.:5" required min="0" max="10" step="0.1">

            <!-- nota2: -->
            <label for="nota2Input">Digite sua 2° nota </label>
            <input type="number" id="nota2Input" placeholder="Ex.:5" required min="0" max="10" step="0.1">

            <button type="submit" id="gerarBotao"> Gerar Média </button>

        </form>
        <!-- <div class="imagens"> <img src="assets/pngwing.com.png" alt="divisao"></div> -->
        <div id="resultadoMedia" class="hidden" aria-live="polite">
            <p id="resNome"></p>
            <p id="resStatus"></p>
            <p id="resMedia"></p>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
