<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Gerador de tabuada interativo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1> Gerador de tabuada </h1>

        <label for="numeroInput">Digite um número:</label>
        <input type="number" id="numeroInput" placeholder="Ex.: 5">
        <button id="gerarBotao"> Gerar Tabuada </button>

        <div id="resultadoTabuada"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
